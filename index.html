<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website met includes</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <!-- HEADER -->
    <div id="header"></div>

    <div class="container">

        <!-- SIDEBAR -->
        <div id="sidebar"></div>

        <!-- INHOUD -->
        <main id="content"></main>
    </div>

    <script>
        // HEADER laden
        fetch("header.html")
            .then(r => r.text())
            .then(t => document.getElementById("header").innerHTML = t);

        // SIDEBAR laden
        fetch("sidebar.html")
            .then(r => r.text())
            .then(t => document.getElementById("sidebar").innerHTML = t);

        // INHOUD dynamisch laden op basis van URL
        function loadPage(page) {
            fetch(page)
                .then(r => r.text())
                .then(t => document.getElementById("content").innerHTML = t);
        }

        // Standaardpagina
        loadPage("pages/home.html");
    </script>

</body>
</html>
